    <tspan fill="#D62828" font-size="150" font-weight="800">PULA</tspan>
    <tspan dx="32" fill="#12355B" font-size="106" font-weight="600">labs</tspan>
  </text>
  <line x1="110" y1="310" x2="1490" y2="310" stroke="#eeeeee" stroke-width="2"/>
  <text x="110" y="385" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#444444">Helvetica</text>
  <text x="800" y="490" text-anchor="middle" dominant-baseline="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" letter-spacing="-1">
    <tspan fill="#D62828" font-size="146" font-weight="700">PULA</tspan>
