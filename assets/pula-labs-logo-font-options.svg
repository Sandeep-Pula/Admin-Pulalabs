  <text x="110" y="945" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#444444">Verdana</text>
  <text x="800" y="1050" text-anchor="middle" dominant-baseline="middle" font-family="Verdana, Arial, Helvetica, sans-serif" letter-spacing="-2">
    <tspan fill="#D62828" font-size="138" font-weight="700">PULA</tspan>
